<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Questionnaire</title>
    <link rel="stylesheet" href="../../style/style.css">
    <script src="../../js/components/navbar.js"></script>
    <script src="../../js/manager.js"></script>
    <style>
table, td {
border: 1px solid black;
padding: 8px;
margin: auto;
border-collapse: collapse;
        }
#button-container {
padding: 8px;
text-align: center;
        }
</style>
</head>
<body>
    <script>replaceNavbar('manager');</script>
    <table id="questionnaire">
        <tr>
            <th>Question</th>
            <th>Most Applicable Team</th>
        </tr>
        <tr>
            <td><input type="text" placeholder="Enter Question"></input></td>
            <td>
                <select name="" id="">
                    <option value="AAA">AAA</option>
                    <option value="BBB">BBB</option>
                </select>
            </td>
            <td><button onclick="deleteRow(this)">Delete This Question...</button></td>
        </tr>   
    </table>
<div id="button-container">
    <button id="addRow">Add New Row...</button>
    <button id="saveQuestionnaire">Save Questionnaire</button>
    <button id="loadSavedQuestionnaire">Load Questionnaire</button>
    <button id="clearQuestionnaire">Clear Questionnaire</button>
</div>


<script src="../../js/questionnaire.js">


</script>
</body>
</html>
