<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Teams</title>
    <link rel="stylesheet" href="../../style/style.css">
    <script src="../../js/manager.js"></script>
    <style>
        h3 {color: blue}
        #teams-container {
            text-align: center;
            display: flex;
            justify-content: center;
            padding: 10px;
            gap: 10px;
            border-style: solid;
        }
        div{
            border-style: solid;
        }
        /*
       .team-column{
            border-style: solid;

       }
        */
    </style>
</head>
<body>
    <h1>Create Teams</h1>
    <div id="teams-container" ></div>

</body>


<script>
const employees = [
    {name: "Abby", team: "AAA"},
    {name: "Bobby", team: "BBB"},
    {name: "Chandler", team: "CCC"}
]


// Hele lorte funktion der laver "drag and drop" funktionaliteten
let draggedEmployee = null;

// Kan være det skal erstattes med server data på managers teams
const teams = employees.map(employee => employee.team);
let teamsSet = new Set(teams);
let teamsSetArray = [...teamsSet];

function buildUI(){

    const container = document.getElementById("teams-container");
    container.innerHTML = "";


    // Laver en 'team' kasse til hvert team
    for (let i = 0; i < teamsSetArray.length; i++){
        const teamColoumn = document.createElement("div");
        teamColoumn.innerHTML = `<h3>${teamsSetArray[i]}</h3>`;
        // teamColoumn.classList.add("team-column");
        
        
        teamColoumn.addEventListener("dragover", e => {
            e.preventDefault();
        })

        teamColoumn.addEventListener("drop", e => {
            e.preventDefault();
            for (let k = 0; k < employees.length; k++){
                if (employees[k].name === draggedEmployee){
                    employees[k].team = teamsSetArray[i];
                }
            }
            buildUI();
        })

        
        container.appendChild(teamColoumn);

        // Laver en 'employee' kasse til hver employee
        for (let j = 0; j < employees.length; j++){
            if (employees[j].team === teamsSetArray[i]){
                const employeeColoumn = document.createElement("div");
                employeeColoumn.innerHTML = `<h4>${employees[j].name}</h4>`;
                // Gør hver employee draggable og gemmer navnet der bliver dragged
                employeeColoumn.draggable = true;
                employeeColoumn.addEventListener("dragstart", e => {
                    draggedEmployee = employees[j].name;
                })

                teamColoumn.appendChild(employeeColoumn);
            }
        }
    }
}
buildUI();

function saveTeams(){

}


</script>
</html>
